name: CI

# Validation-only gate. Runs on pushes to the long-lived branches and on every
# PR. Deployment is handled separately by Vercel, so this workflow needs no
# secrets and only read access to the repo contents.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Least privilege: this workflow only reads the checked-out code.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to an immutable commit SHA (v4 tags) to
      # prevent a compromised tag from injecting code into CI.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test (with 95% coverage gate)
        run: npm run test:coverage

      - name: Build
        run: npm run build
